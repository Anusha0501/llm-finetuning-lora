model:
  name: TinyLlama/TinyLlama-1.1B-Chat-v1.0
  trust_remote_code: false

dataset:
  name: yahma/alpaca-cleaned
  split: train
  validation_size: 0.02
  seed: 42

training:
  output_dir: outputs/tinyllama-alpaca-lora
  max_seq_length: 1024
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 0.0002
  num_train_epochs: 1
  max_steps: -1
  warmup_ratio: 0.03
  logging_steps: 10
  eval_steps: 100
  save_steps: 100
  save_total_limit: 2
  bf16: true
  fp16: false
  gradient_checkpointing: true
  report_to: none

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

quantization:
  use_4bit: false
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_use_double_quant: true

generation:
  max_new_tokens: 256
  temperature: 0.7
  top_p: 0.9
